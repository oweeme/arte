name: Build Arte

on:
  push:
    tags:
      - 'v*'           # se activa con: git tag v0.1.0 && git push --tags
  workflow_dispatch:   # permite lanzarlo manualmente desde GitHub

jobs:

  # ──────────────────────────────────────────────────────────────
  # WINDOWS — .msi y .exe instalador
  # ──────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run tauri build

      - name: Upload instaladores Windows
        uses: actions/upload-artifact@v4
        with:
          name: arte-windows-${{ github.ref_name }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────
  # LINUX — .deb  .rpm  .AppImage
  # ──────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Linux installers
        run: npm run tauri build

      - name: Upload instaladores Linux
        uses: actions/upload-artifact@v4
        with:
          name: arte-linux-${{ github.ref_name }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────
  # ANDROID — APK y AAB firmados
  # ──────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Setup Rust con targets Android
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: android-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Decodificar keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > arte-release.jks

      - name: Crear local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > src-tauri/gen/android/local.properties

      - name: Build Android APK + AAB
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
          ARTE_KEYSTORE_PATH: ${{ github.workspace }}/arte-release.jks
          ARTE_KEYSTORE_PASS: ${{ secrets.ARTE_KEYSTORE_PASS }}
          ARTE_KEY_ALIAS: arte
          ARTE_KEY_PASS: ${{ secrets.ARTE_KEY_PASS }}
        run: ./node_modules/.bin/tauri android build

      - name: Upload APK y AAB
        uses: actions/upload-artifact@v4
        with:
          name: arte-android-${{ github.ref_name }}
          path: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────
  # MACOS — .dmg y .app (Intel + Apple Silicon)
  # ──────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest     # Apple Silicon (M1/M2)

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust con targets macOS
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build macOS (Apple Silicon)
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Build macOS (Intel)
        run: npm run tauri build -- --target x86_64-apple-darwin

      - name: Crear Universal Binary (Intel + Apple Silicon)
        run: |
          # Combinar los dos .app en uno universal con lipo
          ARM_APP="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Arte.app"
          X86_APP="src-tauri/target/x86_64-apple-darwin/release/bundle/macos/Arte.app"
          UNIVERSAL_APP="src-tauri/target/universal/Arte.app"

          mkdir -p "src-tauri/target/universal/Arte.app/Contents/MacOS"

          # Copiar estructura del .app desde ARM
          cp -R "$ARM_APP/Contents" "src-tauri/target/universal/Arte.app/"

          # Combinar los binarios con lipo
          lipo -create \
            "$ARM_APP/Contents/MacOS/Arte" \
            "$X86_APP/Contents/MacOS/Arte" \
            -output "src-tauri/target/universal/Arte.app/Contents/MacOS/Arte"

          # Empaquetar en .dmg
          hdiutil create -volname "Arte" \
            -srcfolder "src-tauri/target/universal/Arte.app" \
            -ov -format UDZO \
            "Arte_universal.dmg"

      - name: Upload macOS
        uses: actions/upload-artifact@v4
        with:
          name: arte-macos-${{ github.ref_name }}
          path: |
            Arte_universal.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────
  # IOS — .ipa para App Store o TestFlight
  # ──────────────────────────────────────────────────────────────
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust con target iOS
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ios-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Inicializar proyecto iOS (si no existe)
        run: |
          if [ ! -d "src-tauri/gen/apple" ]; then
            ./node_modules/.bin/tauri ios init
          fi

      - name: Build iOS
        continue-on-error: true
        run: ./node_modules/.bin/tauri ios build
        env:
          # Para firmar necesitas un Apple Developer certificate
          # Sin certificado genera un build sin firmar (solo simulador)
          TAURI_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}

      - name: Upload iOS
        uses: actions/upload-artifact@v4
        with:
          name: arte-ios-${{ github.ref_name }}
          path: |
            src-tauri/gen/apple/build/arm64/*.ipa
            src-tauri/gen/apple/build/**/*.ipa
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────
  # RELEASE — adjunta todos los archivos al GitHub Release
  # ──────────────────────────────────────────────────────────────
  create-release:
    needs: [build-windows, build-linux, build-android, build-macos]
    if: always()
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Descargar todos los artefactos
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Arte ${{ github.ref_name }}"
          body: |
            ## Arte ${{ github.ref_name }}

            ### Descargas

            | Plataforma | Archivo |
            |-----------|---------|
            | Windows | `Arte_*_x64_en-US.msi` o `Arte_*_x64-setup.exe` |
            | macOS Universal (Intel + M1/M2) | `Arte_universal.dmg` |
            | Linux (Ubuntu/KDE Neon/Mint) | `Arte_*_amd64.deb` |
            | Linux (Fedora/openSUSE) | `Arte-*-1.x86_64.rpm` |
            | Linux (cualquier distro) | `Arte_*_amd64.AppImage` |
            | Android (Play Store) | `Arte_*_android.aab` |
            | Android (instalar directo) | `Arte_*_android.apk` |

            ### Instalación rápida
            - **Windows**: doble clic en el `.msi`
            - **KDE Neon / Ubuntu**: `sudo dpkg -i Arte_*.deb`
            - **Android**: instalar el `.apk` directamente o buscar en Play Store
          files: artifacts/**/*
          draft: false
          prerelease: false
